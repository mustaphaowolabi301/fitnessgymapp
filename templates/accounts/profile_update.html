{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Edit Profile{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-3">
        <!-- Same sidebar as profile -->
        <div class="dashboard-sidebar p-3 text-white rounded">
            <h5 class="mb-4">Member Menu</h5>
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link" href="{% url 'accounts:profile' %}">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link active" href="{% url 'accounts:profile_update' %}">Edit Profile</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'accounts:password_change' %}">Change Password</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'bookings:history' %}">Booking History</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'classes:my_classes' %}">My Classes</a></li>
            </ul>
        </div>
    </div>
    <div class="col-md-9">
        <div class="card">
            <div class="card-header bg-light">
                <h4 class="mb-0">Edit Profile</h4>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-danger">Save Changes</button>
                    <a href="{% url 'accounts:profile' %}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
