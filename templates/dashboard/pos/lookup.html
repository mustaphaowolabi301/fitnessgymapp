{% extends 'dashboard/base.html' %}
{% load crispy_forms_tags %}

{% block title %}POS - Member Lookup{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Point of Sale - Find Member</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary">Find Member</button>
                </form>
                <hr>
                <p>Member not found? <a href="{% url 'accounts:register' %}" target="_blank">Register new member</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
