<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Fitness First GYM</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <style>
        .sidebar {
            min-height: 100vh;
            border-right: 1px solid #dee2e6;
        }

        .sidebar .nav-link {
            color: #333;
            padding: 10px 15px;
            border-radius: 5px;
            margin-bottom: 5px;
        }

        .sidebar .nav-link:hover {
            background-color: #f1f1f1;
        }

        .sidebar .nav-link.active {
            background-color: #0d6efd;
            color: #fff;
        }

        .sidebar .nav-link i {
            margin-right: 8px;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'dashboard:index' %}">
                Fitness First Admin
            </a>

            <div class="d-flex align-items-center">
                <span class="navbar-text me-3">
                    {{ user.email }}
                </span>

                <a href="{% url 'admin:index' %}" class="btn btn-outline-light btn-sm me-2">
                    Django Admin
                </a>

                <a href="{% url 'core:home' %}" class="btn btn-outline-light btn-sm me-2">
                    View Site
                </a>

                <a href="{% url 'accounts:logout' %}" class="btn btn-danger btn-sm">
                    Logout
                </a>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-md-block bg-light sidebar">
                <div class="position-sticky pt-3">
                    <ul class="nav flex-column">
                        <li class="nav-item mb-3">
    <a href="{% url 'dashboard:pos' %}" class="btn btn-success w-100">
        <i class="bi bi-cart-plus"></i> Point of Sale
    </a>
</li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.resolver_match.url_name == 'index' %}active{% endif %}" href="{% url 'dashboard:index' %}">
                                <i class="bi bi-speedometer2"></i>
                                Dashboard
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link {% if 'categories' in request.path %}active{% endif %}" href="{% url 'dashboard:categories' %}">
                                <i class="bi bi-tags"></i>
                                Categories
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link {% if 'package-types' in request.path %}active{% endif %}" href="{% url 'dashboard:package_types' %}">
                                <i class="bi bi-box"></i>
                                Package Types
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link {% if 'packages' in request.path and 'types' not in request.path %}active{% endif %}" href="{% url 'dashboard:packages' %}">
                                <i class="bi bi-archive"></i>
                                Packages
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link {% if 'bookings' in request.path %}active{% endif %}" href="{% url 'dashboard:bookings' %}">
                                <i class="bi bi-calendar-check"></i>
                                Bookings
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link {% if 'payments' in request.path %}active{% endif %}" href="{% url 'dashboard:payments' %}">
                                <i class="bi bi-credit-card"></i>
                                Payments
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link {% if 'reports' in request.path %}active{% endif %}" href="{% url 'dashboard:reports' %}">
                                <i class="bi bi-bar-chart"></i>
                                Reports
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-4 py-4">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
